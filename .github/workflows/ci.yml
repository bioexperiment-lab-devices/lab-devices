name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - name: Install Poetry
        run: pipx install poetry
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: poetry
      - name: Install dependencies
        run: poetry install --all-extras
      - name: Run tests
        run: poetry run pytest
      - name: Type check
        run: poetry run mypy
      - name: Lint
        run: poetry run ruff check .

  webapp-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: webapp/backend/pyproject.toml
      - name: Install backend (library + package, editable)
        run: python -m pip install -e . -e "webapp/backend[dev]"
      - name: Run tests
        working-directory: webapp/backend
        run: python -m pytest -q
      - name: Type check
        working-directory: webapp/backend
        run: python -m mypy
      - name: Lint
        working-directory: webapp/backend
        run: python -m ruff check .

  webapp-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: webapp/frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  webapp-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        # Retry to ride out transient Docker Hub pull timeouts (i/o timeout /
        # DeadlineExceeded resolving base images), a recurring GitHub Actions flake.
        run: |
          for attempt in 1 2 3; do
            docker build -f webapp/Dockerfile -t experiment-studio:ci . && exit 0
            echo "docker build attempt $attempt failed; retrying in 15s..." >&2
            sleep 15
          done
          echo "docker build failed after 3 attempts" >&2
          exit 1
      - name: Smoke test
        run: |
          docker run -d --rm -p 8000:8000 --name studio experiment-studio:ci
          for i in $(seq 1 20); do
            curl -fsS localhost:8000/api/health && break || sleep 1
          done
          curl -fsS localhost:8000/api/health | grep -o '"status":"ok"'
          curl -fsS localhost:8000/ | grep -qi "experiment studio"
          docker rm -f studio
