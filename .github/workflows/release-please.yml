name: release-please

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      # Mint an installation token so release-please's PRs and tags are authored
      # by the App rather than github-actions[bot]. A GITHUB_TOKEN-authored release
      # PR has its CI held at `action_required` until a maintainer clicks
      # "Approve and run" — every release here was merged that way (#23/#26/#29 are
      # all attempt=2). Since `main` now requires those checks, that click became
      # mandatory rather than skippable. App-authored PRs fire CI at attempt=1
      # (verified on serialhop), and the App is the bypass actor for the v* tag
      # ruleset, so release tagging still works.
      - id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_KEY }}
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Install Poetry
        run: pipx install poetry
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build distributions
        run: poetry build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  image:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute version tag
        id: meta
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: webapp/Dockerfile
          push: true
          tags: |
            ghcr.io/bioexperiment-lab-devices/experiment-studio:${{ steps.meta.outputs.version }}
            ghcr.io/bioexperiment-lab-devices/experiment-studio:latest
